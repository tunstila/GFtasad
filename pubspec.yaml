name: mediflow
description: "Revolutionize health commodity and testing management in Nigeria with this intuitive mobile-first app, empowering field providers with offline-first data capture and connecting the entire supply chain from national oversight to local communities."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  geolocator: 13.0.4
  supabase_flutter: '>=1.10.0'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  shared_preferences: ^2.0.0
  intl: 0.20.2
  fl_chart: 0.68.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
